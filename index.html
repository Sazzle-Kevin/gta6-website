<!doctype html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSE VIII</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="wrapper">

    <header></header>

    <section class="hero"></section>

    <!-- ========================= -->
    <!-- Gallery -->
    <!-- ========================= -->

    <section class="characters">

        <div class="characters-header">
          <h1 class="characters-title">Unsere Crew</h1>
        </div>

        <div class="character-container">

            <!-- MUJU -->
            <div class="character-card">

                <img src="Bilder/Muju.png" alt="Muju">

                <h2 class="character-name">Muju</h2>

                <p class="character-description">
                    Der Stratege der Crew.
                    Er plant jeden Coup bis ins Detail und denkt immer mehrere Schritte voraus.
                </p>

                <button class="character-button" data-character="muju">
                    Akte öffnen
                </button>

            </div>

            <!-- KEVIN -->
            <div class="character-card">

                <img src="Bilder/Kevin.png" alt="Kevin">

                <h2 class="character-name">Kevin</h2>

                <p class="character-description">
                    Der Anführer.
                    Ruhig, entschlossen und immer bereit, Verantwortung zu übernehmen.
                </p>

                <button class="character-button" data-character="kevin">
                    Akte öffnen
                </button>

            </div>

            <!-- CHRISTOPHER -->
            <div class="character-card">

                <img src="Bilder/Christopher.png"
                     alt="Christopher"
                    class="christopher-img">

                <h2 class="character-name">Christopher</h2>

                <p class="character-description">
                    Der Accountant.
                    Er behält Finanzen im Auge, Ausrüstung und Logistik im Griff.
                </p>

                <button class="character-button" data-character="christopher">
                    Akte öffnen
                </button>

            </div>

        </div>

    </section>

    <footer></footer>

</div>


</div>

<section class="characters">

</body>

</html>
